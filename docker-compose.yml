services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flashrouter
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: flashrouter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "flashrouter"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://flashrouter:dev@postgres:5432/flashrouter
      REDIS_URL: redis://redis:6379
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: development
      API_KEY_HMAC_SECRET: dev-only-secret-do-not-use
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
