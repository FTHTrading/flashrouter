name: sdk

on:
  push:
    branches: [main]
    paths: ["sdk/**", ".github/workflows/sdk.yml", "package.json"]
  pull_request:
    paths: ["sdk/**", ".github/workflows/sdk.yml", "package.json"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install from root — npm 7+ resolves workspaces automatically.
      # This handles the `workspace:*` reference in dashboard/package.json.
      - name: Install (workspace-aware)
        run: npm install --no-audit --no-fund

      - name: Type check
        working-directory: ./sdk
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ./sdk
        run: npx eslint src --ext .ts
        continue-on-error: true

      - name: Build
        working-directory: ./sdk
        run: npm run build

      - name: Test
        working-directory: ./sdk
        run: npm test --if-present
