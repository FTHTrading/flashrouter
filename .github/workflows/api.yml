name: api

on:
  push:
    branches: [main]
    paths: ["api/**", ".github/workflows/api.yml", "package.json"]
  pull_request:
    paths: ["api/**", ".github/workflows/api.yml", "package.json"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flashrouter_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/flashrouter_test
      API_KEY_HMAC_SECRET: test-secret-do-not-use
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install postgres-client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client -qq

      # Workspace-aware install from root
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type check
        working-directory: ./api
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Migrate
        run: psql "$DATABASE_URL" -f api/migrations/001_initial.sql

      - name: Build
        working-directory: ./api
        run: npm run build
        continue-on-error: true

      - name: Test
        working-directory: ./api
        run: npm test --if-present
