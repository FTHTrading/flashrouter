name: api

on:
  push:
    branches: [main]
    paths: ["api/**", ".github/workflows/api.yml"]
  pull_request:
    paths: ["api/**", ".github/workflows/api.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flashrouter_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: ./api
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/flashrouter_test
      API_KEY_HMAC_SECRET: test-secret-do-not-use
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Migrate
        run: psql "$DATABASE_URL" -f migrations/001_initial.sql

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present
